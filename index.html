<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <title>Animations</title>
</head>
<body>
    <!-----ball bouncing----->
    <div class="ground">
        <div class="ground__area">
            <div class="ball"></div>
        </div>
    </div>
    <!-------pulsing heart------>
    <div class="heart-container">
        <div class="heart"></div>
    </div>
    <!--------spinner---------->
    <div class="loader-container">
        <div class="spinner"></div>
    </div>
    <!---------text slide--------->
    <div class="text-container">
        <h1 class="reveal-text">Learning animation</h1>
    </div>
    <!---------bell icon------------>
        <div class="bell"><img src="/assets/notification.png" alt="bell"></div>
    <!------------day to night toggles------>
    <div class="sky">
        <div class="celestial-body">
        </div>
    </div>
</body>
</html>
