<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" src="./assets/favicon.ico">
  <link rel="stylesheet" href="./css/style.css">
  <title>Portfolio</title>
</head>

<body>
  <div class="layout-container">
    <!------hero section------->
    <header class="hero">
      <a href="mailto:shruthi.bhatt@siriuscom.com" class="hero__email">shruthi.bhatt@siriuscom.com</a>
      <div class="hero__content">
        <h1 class="hero__title"><span class="hero__title-text--light">Shruthi </span><span
            class="hero__title-text--bold">Bhatt</span></h1>
        <h2 class="hero__subtitle">a <span class="text-highlight--blue">product</span> designer</h2>
      </div>
    </header>
    <!--------portfolio grid-------->
    <section class="portfolio">
      <figure class="portfolio__item"><img src="assets/products/rawpixel-769308-unsplash.png" alt="smartphone"
          class="portfolio__image"></figure>
      <figure class="portfolio__item"><img src="assets/products/fancycrave-329196-unsplash.png" alt="plate"
          class="portfolio__image"></figure>
      <figure class="portfolio__item"><img src="assets/products/nadine-shaabana-1112616-unsplash.png" alt="phone"
          class="portfolio__image"></figure>
      <figure class="portfolio__item"><img src="assets/products/fikri-rasyid-689579-unsplash.png" alt="device"
          class="portfolio__image"></figure>
      <figure class="portfolio__item"> <img src="assets/products/marc-mueller-654355-unsplash.png" alt="mobile"
          class="portfolio__image"></figure>
      <figure class="portfolio__item"><img src="assets/products/jeff-sheldon-3219-unsplash.png" alt="headphone"
          class="portfolio__image"></figure>

    </section>
    <!------------portfolio showoff------>
    <section class="showoff">
      <h2 class="showoff__title">Big names to <span class="text-highlight--green">show off</span></h2>
      <div class="showoff__list">
        <figure class="spotify">
          <img src="assets/logos/logo_1.png" alt="spotify" class="showoff__logo">
        </figure>
        <figure class="olympic">
          <img src="assets/logos/logo_3.png" alt="olympics" class="showoff__logo">
        </figure>
        <figure class="adidas">
          <img src="assets/logos/logo_18.png" alt="adidas" class="showoff__logo">
        </figure>
        <figure class="lufthansa">
          <img src="assets/logos/logo_7.png" alt="lufthansa" class="showoff__logo">
        </figure>
        <figure class="ikea">
          <img src="assets/logos/logo_11.png" alt="ikea" class="showoff__logo">
        </figure>
        <figure class="montblanc">
          <img src="assets/logos/logo_2.png" alt="montblanc" class="showoff__logo">
        </figure>
      </div>
    </section>

    <footer class="site-footer">
      <div class="lines">
        <hr class="small__line">
        <hr class="large__line">
      </div>
      <div class="site-footer__socials">
        <a class="site-footer__icon-container" href="https://www.facebook.com/">
          <i class="fa-brands fa-facebook-f site-footer__icon"></i>
        </a>
        <a class="site-footer__icon-container" href="https://x.com/">
          <i class="fa-brands fa-twitter site-footer__icon"></i>
        </a>
        <a class="site-footer__icon-container" href="https://www.instagram.com/?hl=en">
          <i class="fa-brands fa-instagram site-footer__icon"></i>
        </a>
        <a class="site-footer__icon-container" href="https://dribbble.com/"><i
            class="fa-brands fa-dribbble site-footer__icon"></i></a>
        <a class="site-footer__icon-container" href="https://medium.com/"> <i class="fa-solid fa-m site-footer__icon"
            href="https://medium.com/"></i></a>

      </div>
      <p class="site-footer__copyright">Coded with Love & Passion</p>
    </footer>
  </div>
</body>

</html>
