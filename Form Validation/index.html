<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Billing</title>
</head>

<body>
    <header class="site-header">
        <div class="logo-container">
            <img src="./assets/Sirius_CDW_Cobranded_PMS2747.svg" alt="logo" class="logo">
        </div>
    </header>
    <main class="site-content">
        <form class="form-container">
            <section class="billing-details">
                <h2 class="billing-title">BILLING DETAILS</h2>
                <section class="input-group">
                    <section class="form-group">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-input" id="firstName" name="firstName">
                        <p class="error-message">Wrong password</p>
                    </section>
                    <section class="form-group">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-input" id="lastName" name="lastName">
                        <p class="error-message" id="errorMessage"></p>
                    </section>
                </section>
                <section class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" name="email">
                    <p class="error-message"></p>
                </section>
                <section class="form-group">
                    <label for="contact" class="form-label">Contact Number</label>
                    <input type="text" class="form-input" id="contact" name="contact">
                    <p class="error-message"></p>
                </section>
                <section class="form-group">
                    <label for="pincode" class="form-label">PIN Code</label>
                    <input type="text" class="form-input" id="pinCode" name="pinCode">
                    <p class="error-message"></p>
                </section>
            </section>
            <section class="payment-details">
                <h2 class="payment-title">PAYMENT DETAILS</h2>
                <section class="form-group">
                    <label for="cardnumber" class="form-label">Card Number</label>
                    <input type="text" class="form-input" id="cardNumber" name="cardNumber">
                    <p class="error-message"></p>
                </section>
                <section class="input-group">
                    <section class="form-group">
                        <label for="cardExpiry" class="form-label">Card Expiry(Year)</label>
                        <input type="text" class="form-input" id="cardExpiry" name="cardExpiry">
                        <p class="error-message"></p>
                    </section>
                    <section class="form-group">
                        <label for="cvv" class="form-label">CVV</label>
                        <input type="text" class="form-input" id="cvv" name="cvv">
                        <p class="error-message"></p>
                    </section>
                </section>
            </section>
            <button type="button" class="payment-btn" onclick="formValidation()">COMPLETE PAYMENT</button>
        </form>
    </main>
    <script src="script.js"></script>
</body>

</html>
